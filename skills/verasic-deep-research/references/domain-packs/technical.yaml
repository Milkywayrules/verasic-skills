  - benchmark reports from independent labs when comparing products
example_prompts:
  - how does the elevator work?
  - how are electricity towers built and kept safe?
  - how does LED work?
  - how can F1 cars be so fast yet safe and driveable?
  - which VPS is better for users in Japan?
  - best Next.js pattern for a production app in 2026
  - how does GPS know my location?
warnings:
