name: verasic-init

on:
  push:
    paths:
      - 'skills/verasic-init/**'
      - 'skills/verasic-init/manifest.txt'
      - 'cursor/**'
      - 'skills/verasic-init/references/cursor-ux-manifest.txt'
      - 'scripts/check-cursor-ux-manifest.sh'
      - '.github/workflows/verasic-init.yml'
  pull_request:
    paths:
      - 'skills/verasic-init/**'
      - 'skills/verasic-init/manifest.txt'
      - 'cursor/**'
      - 'skills/verasic-init/references/cursor-ux-manifest.txt'
      - 'scripts/check-cursor-ux-manifest.sh'
      - '.github/workflows/verasic-init.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cursor UX manifest
        run: bash scripts/check-cursor-ux-manifest.sh
      - name: init regression
        run: bash skills/verasic-init/scripts/test-regression.sh
